<template>
  <div class="slds-box slds-theme_default slds-p-around_medium">
    <!-- Header -->
    <div
      class="slds-text-align_center slds-m-bottom_large slds-border_bottom slds-p-bottom_medium"
    >
      <div class="slds-m-bottom_small">
        <img
          src={logoUrl}
          alt="CRMANTRA Logo"
          style="max-width: 250px; height: auto"
        />
      </div>
      <h2 class="slds-text-heading_medium">Human Resources Department</h2>
      <h3 class="slds-text-heading_small slds-m-top_x-small">
        “CRM is our Mantra”
      </h3>
      <div
        class="slds-grid slds-grid_align-spread slds-m-top_small slds-text-body_small slds-text-color_weak"
      >
        <span><b>Date:</b> 17.11.2025</span>
        <span><b>Circular No.:</b> HRD/CRM/00C1</span>
      </div>
    </div>

    <template if:true={isLoading}>
      <div class="slds-is-relative slds-p-around_large" style="height: 100px">
        <lightning-spinner
          size="medium"
          alternative-text="Loading Policy..."
        ></lightning-spinner>
      </div>
    </template>

    <template if:false={isLoading}>
      <div class="policy-content slds-text-longform">
        <lightning-formatted-rich-text
          value={policyContent}
        ></lightning-formatted-rich-text>
      </div>
    </template>
  </div>
</template>
