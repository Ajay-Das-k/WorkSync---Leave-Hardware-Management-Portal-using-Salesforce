<template>
  <div class="slds-box slds-theme_default slds-p-around_medium">
    <div
      class="slds-m-bottom_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
    >
      <div>
        <h2 class="slds-text-heading_medium">
          <strong>Edit Company Policy</strong>
        </h2>
        <p class="slds-text-body_small slds-text-color_weak">
          Modify the leave rules and company circular details below. Changes
          will be updated dynamically for all employees.
        </p>
      </div>
      <lightning-button
        label="Save Changes"
        variant="brand"
        icon-name="utility:save"
        onclick={handleSave}
        disabled={isLoading}
        loading={isSaving}
      >
      </lightning-button>
    </div>

    <template if:true={isLoading}>
      <div class="slds-is-relative slds-p-around_large" style="height: 200px">
        <lightning-spinner
          size="medium"
          alternative-text="Loading Policy..."
        ></lightning-spinner>
      </div>
    </template>

    <template if:false={isLoading}>
      <div class="slds-m-top_medium">
        <lightning-input-rich-text
          value={policyContent}
          onchange={handleContentChange}
          label="Policy Text Content"
          style="min-height: 450px"
        >
        </lightning-input-rich-text>
      </div>
    </template>
  </div>
</template>
